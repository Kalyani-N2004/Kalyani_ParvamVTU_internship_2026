<!doctype html>
<html lang="en">
    <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"

    <body>
       <form class="mt-3 container">
        <div class="mb-3">
            <label  class="form-label" for="name">name</label>
            <input  class="form-control" type="text" name="name" id="name">
        </div>
        <div class="form-floating mb-3">
  <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
  <label for="floatingInput">Email address</label>
</div>
<div class="form-floating mb-3">
  <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
  <label for="floatingPassword">Password</label>
</div>
        <!--<div class="mb-3">
            <label class="form-label"  for="email">email id:</label>
            <input  class="form-control" type="email" name="phone" id="email">
        </div>-->
        <div class="mb-3">
            <label class="form-label" for="phone">phone number</label>
            <input class="form-control"  type="tel" name="phone" id="phone">
        </div>
        <!--<div class="mb-3">
            <label class="form-label"  for="password">password:</label>
            <input class="form-control"  type="tel" name="password" id="password">-->
        </div>
        <div class="mb-3">
            <label class="form-label" for="address">address</label>
            <input class="form-control" rows="5" name="address" id="address"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label" for="dob">date of  birth:</label>
            <input class="form-control"type="date" name="dob" id="dob">
        </div>
        <div class="form-check">
  <input class="form-check-input" type="checkbox" value="Tamil"  name="known languages"id="Tamil">
  <label class="form-check-label" for="tamil">
    tamil
  </label>
</div>
<div class="form-check">
  <input class="form-check-input" type="checkbox" value="Telgu"  name="known languages"id="Telgu">
  <label class="form-check-label" for="telgu">
    telgu
  </label>
</div>
<div class="mb-3">
    <label class="form-label" for="gender">Gender:</label>
    <div class="d-flex gap-2">
    <div class="form-check">
        <input class="form-check-input" type="radio" name="gender" id="male" value="male">
        <label for="form-check-label" for="male">Male</label>
    </div>
    </div>
    </div>
    <div>
        <div class="form-check">
        <input class="form-check-input" type="radio" name="gender" id="female" value="female">
        <label for="form-check-label" for="female">FeMale</label>
    </div>
    </div>

</div>
    <div class="mb-3">
        <label for="course">course:</label>
        <select class="form-select">
            <option> select the option</option>
            <option value="JFSD" selected> java full stack web development</option>
            <option value="pFSD" selected> python full stack web development</option>
            <option value="ml" selected>machine learning</option>

        </select>

    </div>
    <div class="mb-3">
    <label  class="form-label" for="rating">give rating:</label>
<input type="range" class="form-range" min="1" max="5"  name="rating"id="rating">
</div>
    <input class="btn btn-danger" type="reset" value="clear-form">
    <input class="btn btn-success" type="submit" value="submit-form">
    

        <input type="reset" value="clear form">
        <input type="submit" value="submit form">
       </form>

            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"

        ></script>

</html>
