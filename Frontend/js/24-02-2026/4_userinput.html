<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1> user input in JS</h1>
<p>prompt</p>

<script>
    const marks = +prompt("enter the marks");
    console.log("your marks is:",marks);
    console.log("type of marks is:",typeof marks);
    //+ to convert string to number
switch(marks){
    case 90:{
        console.log("A");
        break;
    }
    case 80:{
        console.log("B");
        break;
    }
    case 70:{
        console.log("C");
        break;
    }
    default:{
        console.log("D");
    }

}
</script>
</body>
</html>
