<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>operators in JavaScript</h1>
    <p>1.arithmetic operators -+,-,*,/,%,**</p>
    <p>2.assignmet operators - =,+=,-=,*=,/=,%=</p>
    <p>3.comparision operators -==,===,!=,!==,>,<,>=,<= </p>
    <p>4.logical operators - &&,||,|</p>
    <p>5.bitwise operators -&,|,^,~,<<,>>,>>></p>
</body>
<script>
    let marks1=85;
    let marks2='85';
    //==:checks only value,===:checks datatype and also value
    console.log("type of marks1:",typeof marks1);
    console.log("type of marks2:",typeof marks2);
    console.log("marks1== marks2:",marks1== marks2);
    console.log("marks1===marks2:",marks1===marks2);
    console.log("marks1!=marks2:",marks1!=marks2);
    console.log("marks1!==marks2:",marks1!==marks2);
</script>
</html>
