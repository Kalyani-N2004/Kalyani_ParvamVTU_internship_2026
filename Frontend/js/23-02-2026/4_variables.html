<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variables</title>
</head>
<body>
    <h1> variables in javascript</h1>
    <p>4 ways to create a variables</p>
    <h3>1.Automattically</h3>
    <h3>2.var keyword</h3>
    <h3>3.let keyword</h3>
    <h3>4.const keyword</h3>
    
    <script>
        first_name="john";
        console.log("the first name is:",first_name);

        var last_name="doe"
        console.log("last name is:",last_name);
         
        let age=23;
        console.log("age:",age);

        const pi=3.14;
        console.log("pi:",pi);
    </script>

    <script>
         var gender='M';
         console.log("gender:",gender);
         var gender='F';
         console.log("gender:",gender);

        let marks=90;
        console.log("marks:",marks);
        marks=95;
        console.log("marks:",marks);

        const country="India";
        console.log("country:",country);
        console.log("country:",country);

        {
            var city="bengaluru";
            console.log("city:",city);
        }
        console.log("city:",city);

        {
            let state="karnataka";
            console.log("state:",state);
        }
          
          {
          let a="10";
           console.log("a:",a);        }
           console.log("a:",a);   

          </script>
 
</body>
