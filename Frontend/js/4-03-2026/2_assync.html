<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <h1>asynchronous in js</h1>  
  <p>by default js is synchronous-it will execute the program line by line</p>
  <p>asynchronous is used in api calls,db queries</p>
  <p>1.setTimeout</p>
  <p>2.setInterval</p>
  <p>callback</p>
  <p>3.promise</p>
  <p> asyn and await</p>
  <p>4.fetch up</p>
  
  <script>
    //synchronous
    console.log("first");
    console.log("second");
    console.log("third");
    console.log("fourth");
    console.log("fifth");
    //asynchronous
    console.log("1");
    console.log("2");
    //this won't execute
    setTimeout(()=>{
        console.log("async");
    },3000);
    console.log("3");
    console.log("4");
    </script>
</body>
</html>
