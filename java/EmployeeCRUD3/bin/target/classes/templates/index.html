<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee List</title>
</head>
<body>

<h2>Employee List</h2>

<a href="/showNewEmployeeForm">Add Employee</a>

<br><br>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Salary</th>
        <th>Action</th>
    </tr>

    <tr th:each="emp : ${listEmployees}">
        <td th:text="${emp.id}"></td>
        <td th:text="${emp.name}"></td>
        <td th:text="${emp.email}"></td>
        <td th:text="${emp.department}"></td>
        <td th:text="${emp.salary}"></td>

        <td>
            <!-- EDIT BUTTON -->
            <a th:href="@{'/showFormForUpdate/' + ${emp.id}}">Edit</a>

            |

            <!-- DELETE BUTTON -->
            <a th:href="@{'/deleteEmployee/' + ${emp.id}}">Delete</a>
        </td>
    </tr>

</table>

</body>
</html>
