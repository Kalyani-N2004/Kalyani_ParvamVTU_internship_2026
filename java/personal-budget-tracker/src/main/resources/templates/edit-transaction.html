<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Transaction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Edit Transaction
        </h2>

        <!-- FORM -->
        <form th:action="@{/update}"
              th:object="${transaction}"
              method="post">

            <!-- ID -->
            <input type="hidden"
                   th:field="*{id}">

            <!-- TITLE -->
            <div class="mb-3">

                <label class="form-label">
                    Title
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{title}"
                       required>

            </div>

            <!-- AMOUNT -->
            <div class="mb-3">

                <label class="form-label">
                    Amount
                </label>

                <input type="number"
                       step="0.01"
                       class="form-control"
                       th:field="*{amount}"
                       required>

            </div>

            <!-- TYPE -->
            <div class="mb-3">

                <label class="form-label">
                    Type
                </label>

                <select class="form-select"
                        th:field="*{type}"
                        required>

                    <option value="INCOME">
                        INCOME
                    </option>

                    <option value="EXPENSE">
                        EXPENSE
                    </option>

                </select>

            </div>

            <!-- CATEGORY -->
            <div class="mb-3">

                <label class="form-label">
                    Category
                </label>

                <!-- IMPORTANT FIX -->
                <select class="form-select"
                        th:field="*{category.id}"
                        required>

                    <option value="">
                        -- Select Category --
                    </option>

                    <option value="1">
                        Food
                    </option>

                    <option value="2">
                        Rent
                    </option>

                    <option value="3">
                        Travel
                    </option>

                    <option value="4">
                        Shopping
                    </option>

                </select>

            </div>

            <!-- DATE -->
            <div class="mb-3">

                <label class="form-label">
                    Date
                </label>

                <input type="date"
                       class="form-control"
                       th:field="*{date}"
                       required>

            </div>

            <!-- BUTTONS -->
            <div class="text-center mt-4">

                <button type="submit"
                        class="btn btn-primary">

                    Update Transaction

                </button>

                <a href="/dashboard"
                   class="btn btn-secondary ms-2">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
