<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - Transactions</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #eef2f7;
            font-family: 'Segoe UI', sans-serif;
        }

        .header {
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
        }

        .container-box {
            max-width: 1100px;
            margin: 30px auto;
        }

        .card-box {
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-add:hover {
            transform: scale(1.03);
            color: white;
        }

        thead {
            background: #1b263b;
            color: white;
        }

        th, td {
            text-align: center;
            padding: 12px;
        }

        tr:hover {
            background: #f1f7ff;
        }

        .income {
            background: #d1f7dd;
            color: #1e7e34;
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: 600;
        }

        .expense {
            background: #ffd6d6;
            color: #c82333;
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn-edit {
            background: #007bff;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-edit:hover, .btn-delete:hover {
            opacity: 0.85;
            color: white;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    💰 Personal Finance Tracker
</div>

<!-- CONTENT -->
<div class="container container-box">

    <div class="card-box">

        <!-- ADD BUTTON -->
        <a href="/add" class="btn-add">
            <i class="bi bi-plus-circle"></i> Add Transaction
        </a>

        <!-- TABLE -->
        <div class="table-responsive">

            <table class="table table-bordered align-middle">

                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Amount</th>
                        <th>Type</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="t : ${transactions}">

                        <td th:text="${t.title}"></td>

                        <td>₹ <span th:text="${t.amount}"></span></td>

                        <td>
                            <span th:text="${t.type}"
                                  th:classappend="${t.type == 'INCOME'} ? 'income' : 'expense'">
                            </span>
                        </td>

                        <td th:text="${t.date}"></td>

                        <!-- ACTION BUTTONS -->
                        <td>

                            <!-- EDIT -->
                            <a th:href="@{'/edit/' + ${t.id}}" class="btn-edit">
                                <i class="bi bi-pencil-square"></i> Edit
                            </a>

                            <!-- DELETE -->
                            <a th:href="@{'/delete/' + ${t.id}}"
                               onclick="return confirm('Are you sure?')"
                               class="btn-delete">
                                <i class="bi bi-trash"></i> Delete
                            </a>

                        </td>

                    </tr>
                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
