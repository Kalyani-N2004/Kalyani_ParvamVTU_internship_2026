<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Finance Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background: #f5f7fb; }

        .sidebar {
            height: 100vh;
            background: #0d1b2a;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            margin: 15px 0;
            text-decoration: none;
        }

        .sidebar a:hover { color: #00b4d8; }

        .card-box {
            border-radius: 15px;
            padding: 20px;
            color: white;
        }

        .income { background: #28a745; }
        .expense { background: #dc3545; }
        .savings { background: #007bff; }
        .budget { background: #ffc107; color: black; }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>Finance Tracker</h4>

            <!-- FIXED LINKS -->
            <a href="/dashboard">Dashboard</a>
            <a href="/home">Transactions</a>
            <a href="/add">Add Transaction</a>

            <hr>

            <a href="/login">Logout</a>
        </div>

        <!-- MAIN -->
        <div class="col-md-10 p-4">

            <h2>Dashboard</h2>

            <!-- BUDGET WARNING -->
            <div th:if="${warning}" class="alert alert-danger">
                <b th:text="${warning}"></b>
            </div>

            <div class="row g-3">

                <!-- INCOME -->
                <div class="col-md-3">
                    <div class="card-box income">
                        <h5>Income</h5>
                        <h3>₹ <span th:text="${income}">0</span></h3>
                    </div>
                </div>

                <!-- EXPENSE -->
                <div class="col-md-3">
                    <div class="card-box expense">
                        <h5>Expense</h5>
                        <h3>₹ <span th:text="${expense}">0</span></h3>
                    </div>
                </div>

                <!-- BALANCE -->
                <div class="col-md-3">
                    <div class="card-box savings">
                        <h5>Balance</h5>
                        <h3>₹ <span th:text="${balance}">0</span></h3>
                    </div>
                </div>

                <!-- BUDGET -->
                <div class="col-md-3">
                    <div class="card-box budget">

                        <h5>Budget</h5>

                        <!-- SET BUDGET -->
                        <form action="/setBudget" method="post">
                            <input type="number"
                                   name="budget"
                                   class="form-control mb-2"
                                   placeholder="Enter Budget"
                                   min="0"
                                   required>

                            <button class="btn btn-dark btn-sm w-100">
                                Set Budget
                            </button>
                        </form>

                        <!-- DISPLAY BUDGET SAFE -->
                        <h3 class="mt-2">
                            ₹ <span th:text="${budget != null ? budget : 0}">0</span>
                        </h3>

                    </div>
                </div>

            </div>

            <br><br>

            <!-- CHART -->
            <canvas id="myChart"></canvas>

        </div>
    </div>
</div>

<!-- CHART SCRIPT -->
<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function () {

    let income = /*[[${income}]]*/ 0;
    let expense = /*[[${expense}]]*/ 0;
    let balance = /*[[${balance}]]*/ 0;

    const ctx = document.getElementById('myChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Income', 'Expense', 'Balance'],
            datasets: [{
                label: 'Finance Overview',
                data: [income, expense, balance],
                backgroundColor: ['#28a745', '#dc3545', '#007bff']
            }]
        }
    });

});
</script>

</body>
</html>
