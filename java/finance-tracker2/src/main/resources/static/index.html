<!DOCTYPE html>
<html>
<head>
    <title>Finance Tracker</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body onload="initApp()">

<div class="container mt-4">

    <!-- ================= TITLE ================= -->
    <h2 class="text-center mb-4">Personal Finance Tracker</h2>

    <!-- ================= DASHBOARD ================= -->
    <div class="row text-center mt-4">

        <div class="col-md-4 mb-2">
            <div class="card p-3">
                <h5>Total Income</h5>
                <h3 id="totalIncome">0</h3>
            </div>
        </div>

        <div class="col-md-4 mb-2">
            <div class="card p-3">
                <h5>Total Expense</h5>
                <h3 id="totalExpense">0</h3>
            </div>
        </div>

        <div class="col-md-4 mb-2">
            <div class="card p-3">
                <h5>Balance</h5>
                <h3 id="balance">0</h3>
            </div>
        </div>

    </div>

    <hr>

    <!-- ================= BUDGET SECTION ================= -->
    <div class="card p-3 mt-4">

        <h4>Budget Section</h4>

        <input type="number" id="budgetAmount" class="form-control mb-2" placeholder="Set Monthly Budget">

        <button class="btn btn-dark" onclick="saveBudget()">
            Set Budget
        </button>

        <h5 class="mt-3">
            Current Budget: <span id="currentBudget">0</span>
        </h5>

        <h5>
            Status: <span id="budgetStatus"></span>
        </h5>

    </div>

    <hr>

    <!-- ================= CHART SECTION ================= -->
    <div class="card p-3 mt-4">

        <h4>Income vs Expense Chart</h4>

        <canvas id="financeChart"></canvas>

    </div>

    <hr>

    <!-- ================= EXPENSE SECTION ================= -->
    <div class="card p-3 mt-4">

        <h4>Expense Section</h4>

        <input type="text" id="title" class="form-control mb-2" placeholder="Expense Title">
        <input type="number" id="amount" class="form-control mb-2" placeholder="Expense Amount">
        <input type="text" id="category" class="form-control mb-2" placeholder="Category">
        <input type="date" id="date" class="form-control mb-2">

        <button class="btn btn-primary" onclick="saveExpense()">
            Save Expense
        </button>

    </div>

    <h4 class="mt-4">Expense List</h4>

    <table class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="expenseTable"></tbody>
    </table>

    <hr>

    <!-- ================= INCOME SECTION ================= -->
    <div class="card p-3 mt-4">

        <h4>Income Section</h4>

        <input type="text" id="source" class="form-control mb-2" placeholder="Income Source">
        <input type="number" id="incomeAmount" class="form-control mb-2" placeholder="Income Amount">
        <input type="date" id="incomeDate" class="form-control mb-2">

        <button class="btn btn-success" onclick="saveIncome()">
            Save Income
        </button>

    </div>

    <h4 class="mt-4">Income List</h4>

    <table class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Source</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="incomeTable"></tbody>
    </table>

</div>

<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
